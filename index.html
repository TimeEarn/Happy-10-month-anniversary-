<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:#fff;
  text-align:center;
  overflow:hidden;
  touch-action:none;
}
#screen4{
  height:100vh;
  overflow-y:auto;
  padding-bottom:50px;
}
.screen{display:none;padding:20px;}
.active{display:block;}

.start-btn{
  font-size:4em;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

#board{
  width:300px;
  height:300px;
  margin:20px auto;
  position:relative;
  border:3px solid #fff;
  background:#ffffff22;
}

.cell{
  position:absolute;
  width:100px;
  height:100px;
}

.piece{
  width:100px;
  height:100px;
  background-image:url('love.jpg');
  background-size:300% 300%;
  position:absolute;
  cursor:grab;
}

video{
  width:60%;
  max-width:250px;
  height:auto;
  border-radius:15px;
  margin:0 auto;
  display:block;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
input{padding:12px;font-size:18px;border-radius:10px;border:none;width:80%;}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<div id="screen1" class="screen active">
  <h1>กดหัวใจสิ 💖</h1>
  <div class="start-btn" onclick="startApp()">💖</div>
</div>

<div id="screen2" class="screen">
  <h2>ต่อภาพรักเรา 🧩</h2>
  <div id="board"></div>
  <p id="puzzleText"></p>
</div>

<div id="screen3" class="screen">
  <h2>ใส่รหัสลับ 💌</h2>
  <input id="codeInput" placeholder="ใส่รหัส">
  <br><br>
  <button onclick="checkCode()">ยืนยัน</button>
  <p id="codeText"></p>
</div>

<div id="screen4" class="screen">
  <h2>สำหรับเธอ 💖</h2>

  <!-- 🔥 แก้ตรงนี้ -->
  <video id="videoPlayer" autoplay muted playsinline style="pointer-events:none;"></video>

  <br><br>

  <p style="margin-top:20px;font-size:18px;">
    สุสันต์วันครบรอบนะ ❤️ รักเธอนะ เธอรักเค้าไหม
  </p>

  <button onclick="closeSite()">รักมากกกก</button>
</div>

<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="voiceAudio" preload="auto">
  <source src="voice.mp3" type="audio/mpeg">
</audio>

<script>

let bg, voice;

/* 🎬 PLAYLIST VIDEO */
const videos = [
  "clip1.mp4",
  "clip2.mp4",
  "clip3.mp4",
  "clip4.mp4",
  "clip5.mp4"
];

let currentVideo = 0;

function playVideoSequence(){
  const player = document.getElementById("videoPlayer");

  currentVideo = 0;
  player.src = videos[currentVideo];
  player.play().catch(()=>{});

  player.onended = () => {
    currentVideo++;

    if(currentVideo < videos.length){
      player.src = videos[currentVideo];
      player.play().catch(()=>{});
    }
  };
}

/* init */
window.addEventListener("DOMContentLoaded",()=>{
  bg = document.getElementById("bgMusic");
  voice = document.getElementById("voiceAudio");

  bg.volume = 0.3;
  voice.volume = 0;
});

/* NAV */
function go(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* START */
function startApp(){
  bg.volume = 0.3;
  bg.play().catch(()=>{});
  go('screen2');
  initPuzzle();
}

/* fade */
function fade(audio, target, speed=0.005){
 return new Promise(resolve=>{
  let t=setInterval(()=>{
    if(Math.abs(audio.volume-target)<0.02){
      audio.volume=target;
      clearInterval(t);
      resolve();
      return;
    }
    audio.volume += (audio.volume<target?speed:-speed);
  },50);
 });
}

/* PUZZLE */
const size=3;
let correct=0;
let occupied={};
let dragged=null;


function initPuzzle(){

 const board=document.getElementById('board');
 board.innerHTML='';
 document.querySelectorAll('.piece').forEach(p=>p.remove());

 correct=0;
 occupied={};

 for(let i=0;i<size;i++){
  for(let j=0;j<size;j++){
    const idx=i*size+j;
    const c=document.createElement('div');
    c.className='cell';
    c.style.left=(j*100)+'px';
    c.style.top=(i*100)+'px';
    c.dataset.index=idx;
       board.appendChild(c);
  }
 }

 for(let i=0;i<size*size;i++){
  const p=document.createElement('div');
  p.className='piece';
  p.dataset.index=i;

  const x=i%size;
  const y=Math.floor(i/size);

  p.style.backgroundPosition=`${x*50}% ${y*50}%`;
  p.style.left=(Math.random()*70)+'%';
  p.style.top=(Math.random()*70)+'%';
p.style.touchAction = "none";

p.addEventListener("pointerdown", (e) => {
  dragged = p;
  p.setPointerCapture(e.pointerId);

  let offsetX = e.clientX - p.offsetLeft;
  let offsetY = e.clientY - p.offsetTop;

  function move(e){
    if(!dragged) return;

    p.style.left = (e.clientX - offsetX) + "px";
    p.style.top = (e.clientY - offsetY) + "px";
  }

  function up(e){
    p.releasePointerCapture(e.pointerId);

    document.removeEventListener("pointermove", move);
    document.removeEventListener("pointerup", up);

    checkDrop(p);
    dragged = null;
  }

  document.addEventListener("pointermove", move);
  document.addEventListener("pointerup", up);
});
   document.body.appendChild(p);
 }
}

/* drop */
function onDropCell(e){
 if(!dragged) return;

 const targetIndex=e.currentTarget.dataset.index;

 e.currentTarget.appendChild(dragged);
 dragged.style.left='0';
 dragged.style.top='0';

 occupied[targetIndex]=dragged;

 checkWin();
}

/* win */
function checkWin(){

 let pieces = document.querySelectorAll('.piece');
 let correctCount = 0;

 pieces.forEach(p=>{
   const parent = p.parentElement;
   if(parent && parent.dataset.index == p.dataset.index){
     correctCount++;
   }
 });

 if(correctCount === size*size){
  document.getElementById('puzzleText').innerText='ต่อสำเร็จแล้ว 💖';
  setTimeout(()=>go('screen3'),1200);
 }
}

/* 🔥 วางตรงนี้เลย */
function checkDrop(piece){

  const cells = document.querySelectorAll('.cell');

  cells.forEach(cell => {
    const rect = cell.getBoundingClientRect();
    const pieceRect = piece.getBoundingClientRect();

    if(
      pieceRect.left < rect.right &&
      pieceRect.right > rect.left &&
      pieceRect.top < rect.bottom &&
      pieceRect.bottom > rect.top
    ){
      cell.appendChild(piece);
      piece.style.left='0';
      piece.style.top='0';
    }
  });

  checkWin();
}

/* SOUND + START VIDEO */
async function checkCode(){

 const val=document.getElementById('codeInput').value;

 if(val!=='15668'){
  document.getElementById('codeText').innerText='ผิดนะ 😏';
  return;
 }

 document.getElementById('codeText').innerText='ถูกต้อง 💕';

 setTimeout(async ()=>{

  go('screen4');

  /* 🔥 เรียกเล่นคลิป */
  playVideoSequence();

  await fade(bg,0.01,0.005);

  voice.pause();
  voice.currentTime = 0;
  voice.volume = 0;

  try{
    await voice.play();
  }catch(e){
    setTimeout(()=>voice.play(),300);
  }

  let inFade=setInterval(()=>{
    if(voice.volume<1){
      voice.volume += 0.05;
    }else{
      clearInterval(inFade);
    }
  },50);

  voice.onended=async ()=>{
    let out=setInterval(()=>{
      if(voice.volume>0){
        voice.volume -= 0.05;
      }else{
        clearInterval(out);
      }
    },50);

    await fade(bg,0.3,0.02);
  };

 },500);
}

/* close */
function closeSite(){
  window.open('', '_self');
  window.close();
  setTimeout(()=>document.body.innerHTML="💖 รักนะ",300);
}

</script>

</body>
</html>
